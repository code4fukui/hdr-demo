<!DOCTYPE html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width"><link rel="icon" href="data:">
<title>HDR DEMO by WebGPU (rgba16float + Float16Array)</title>
<style>
  html,body{height:100%;margin:0;background:#111;color:#ddd;font-family:system-ui}
  canvas{width:100%;height:100%;display:block}
  .hud{position:fixed;left:10px;top:10px;background:#000a;padding:8px 10px;border-radius:10px}
  input{vertical-align:middle}
</style>

<canvas id="c"></canvas>
<div class="hud">
  <div id="status">init...</div>
  <div style="margin-top:6px">
    exposure <input id="exp" type="range" min="-2" max="6" step="0.01" value="2.2">
    <span id="expv"></span>
  </div>
  <div style="margin-top:6px">
    maxStops <input id="stops" type="range" min="0" max="10" step="0.01" value="4.0">
    <span id="stopsv"></span>
  </div>
</div>

<script type="module">
const canvas = document.querySelector("#c");
const statusEl = document.querySelector("#status");
const expEl = document.querySelector("#exp");
const stopsEl = document.querySelector("#stops");
const expv = document.querySelector("#expv");
const stopsv = document.querySelector("#stopsv");

const W = 256;
const H = 256;
const FPS = 60;           // 生成フレーム速度(PREGEN=falseの時)
const PREGEN = false;     // trueにするとフレーム列を先に作ってループ
const FRAME_COUNT = 120;  // PREGEN用

expv.textContent = expEl.value;
stopsv.textContent = stopsEl.value;
expEl.oninput = () => expv.textContent = expEl.value;
stopsEl.oninput = () => stopsv.textContent = stopsEl.value;

function setStatus(s) { statusEl.textContent = s; }

if (!navigator.gpu) {
  setStatus("WebGPU not supported");
  throw new Error("WebGPU not supported");
}

if (!globalThis.Float16Array) {
  setStatus("Float16Array not supported in this browser");
  throw new Error("Float16Array not supported");
}

const adapter = await navigator.gpu.requestAdapter();
if (!adapter) throw new Error("No adapter");
const device = await adapter.requestDevice();
const ctx = canvas.getContext("webgpu");

// ---- canvas configure(リサイズ時に再configureする)----
let canvasFormat = "rgba16float";
let hdrMode = "unknown";

function configureCanvas() {
  // HDRを試す
  try {
    ctx.configure({
      device,
      format: "rgba16float",
      toneMapping: { mode: "extended" },
    });
    const cfg = ctx.getConfiguration?.();
    canvasFormat = cfg?.format ?? "rgba16float";
    hdrMode = cfg?.toneMapping?.mode ?? "extended?";
  } catch {
    canvasFormat = navigator.gpu.getPreferredCanvasFormat();
    ctx.configure({
      device,
      format: canvasFormat,
      toneMapping: { mode: "standard" },
    });
    hdrMode = "standard";
  }
  setStatus(`canvas: ${canvasFormat}  toneMapping: ${hdrMode}`);
}

let pipeline, bindGroup;

// ---- アップロード用テクスチャ: rgba16float (Float16Arrayをそのままコピー)----
let uploadTex = device.createTexture({
  size: [W, H, 1],
  format: "rgba16float",
  usage: GPUTextureUsage.COPY_DST | GPUTextureUsage.TEXTURE_BINDING,
});
let uploadView = uploadTex.createView();

// ---- shader(sampler無し、textureLoadで読む)----
const shader = /* wgsl */`
struct U {
  canvasW: u32,
  canvasH: u32,
};

@group(0) @binding(0) var t: texture_2d<f32>; // ← underlyingが16-bitでも読み出しはf32でOK
@group(0) @binding(1) var<uniform> u: U;

@vertex fn vs(@builtin(vertex_index) i:u32) -> @builtin(position) vec4<f32> {
  let p = array<vec2<f32>, 3>(vec2(-1.0, -1.0), vec2(3.0, -1.0), vec2(-1.0, 3.0));
  return vec4(p[i], 0.0, 1.0);
}

@fragment fn fs(@builtin(position) pos: vec4<f32>) -> @location(0) vec4<f32> {
  let dim = textureDimensions(t); // (W,H)

  // キャンバス座標(ピクセル) -> テクスチャ座標(最近傍)
  // pos.x/y は 0..canvasW/H 近辺
  let sx = clamp(i32(pos.x), 0, i32(u.canvasW) - 1);
  let sy = clamp(i32(pos.y), 0, i32(u.canvasH) - 1);

  // キャンバスをテクスチャにフィット(最近傍拡大縮小)
  let tx = (sx * i32(dim.x)) / max(1, i32(u.canvasW));
  let ty = (sy * i32(dim.y)) / max(1, i32(u.canvasH));

  return textureLoad(t, vec2<i32>(tx, ty), 0);
  //return vec4(5.0, 5.0, 5.0, 1.0);
}
`;
const module = device.createShaderModule({ code: shader });

const ubufsize = 8;
const ubuf = device.createBuffer({
  size: ubufsize,
  usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST,
});

function makePipelineAndBindGroup() {
  pipeline = device.createRenderPipeline({
    layout: "auto",
    vertex: { module, entryPoint: "vs" },
    fragment: { module, entryPoint: "fs", targets: [{ format: canvasFormat }] },
    primitive: { topology: "triangle-list" },
  });

  bindGroup = device.createBindGroup({
    layout: pipeline.getBindGroupLayout(0),
    entries: [
      { binding: 0, resource: uploadView },
      { binding: 1, resource: { buffer: ubuf } },
    ],
  });
}

// ---- Float16Arrayフレーム生成(RGBA)----
function makeFrame(t) {
  const a = new Float16Array(W * H * 4);
  const maxStops = parseFloat(stopsEl.value);
  const exp = parseFloat(expEl.value);   // exposure;
  // 右方向に 2^0 .. 2^maxStops のレンジを作って、HDR階調が出るか試す
  for (let y = 0; y < H; y++) {
    for (let x = 0; x < W; x++) {
      const i = (y * W + x) * 4;
      const u = x / (W - 1);
      const v = y / (H - 1);

      const hdrRamp = Math.pow(2, u * maxStops); // 1..2^maxStops
      const wave = 0.5 + 0.5 * Math.sin(t * 2 + u * 10 + v * 6);

      // "白より上"を含む値(HDR向け)
      const base = 0.1 + hdrRamp * (0.2 + 0.8 * wave); // だいたい 0.1..(2^maxStops)

      a[i] = base * u * exp;        // R
      a[i + 1] = base * v * exp;        // G
      a[i + 2] = base * (1 - u) * exp;     // B
      a[i + 3] = 1.0;             // A
    }
  }
  return a;
}

let frames = null;
if (PREGEN) {
  frames = Array.from({length: FRAME_COUNT}, (_,k) => makeFrame(k / FRAME_COUNT * Math.PI * 2));
}

// ---- writeTexture(bytesPerRow 256アライメント対応) for rgba16float ----
function uploadFloat16RGBA(frameF16) {
  // rgba16float = 8 bytes/px (4ch * 2 bytes)
  const bytesPerPixel = 8;
  const unpaddedBPR = W * bytesPerPixel;
  const paddedBPR = (unpaddedBPR + 255) & ~255;

  if (paddedBPR === unpaddedBPR) {
    device.queue.writeTexture(
      { texture: uploadTex },
      frameF16, // Float16Arrayをそのまま
      { bytesPerRow: unpaddedBPR, rowsPerImage: H },
      { width: W, height: H, depthOrArrayLayers: 1 }
    );
    return;
  }

  // パディング:Uint8で1行ずつコピー
  const srcBytes = new Uint8Array(frameF16.buffer, frameF16.byteOffset, frameF16.byteLength);
  const padded = new Uint8Array(paddedBPR * H);
  for (let y = 0; y < H; y++) {
    const srcOff = y * unpaddedBPR;
    const dstOff = y * paddedBPR;
    padded.set(srcBytes.subarray(srcOff, srcOff + unpaddedBPR), dstOff);
  }

  device.queue.writeTexture(
    { texture: uploadTex },
    padded,
    { bytesPerRow: paddedBPR, rowsPerImage: H },
    { width: W, height: H, depthOrArrayLayers: 1 }
  );
}

// ---- リサイズ:canvas.width/height変更時は再configure & pipeline作り直し ----
function resizeCanvas() {
  const dpr = devicePixelRatio || 1;
  const w = Math.max(1, Math.floor(canvas.clientWidth * dpr));
  const h = Math.max(1, Math.floor(canvas.clientHeight * dpr));
  if (canvas.width !== w || canvas.height !== h) {
    canvas.width = w;
    canvas.height = h;

    const oldFmt = canvasFormat;
    configureCanvas();
    if (!pipeline || canvasFormat !== oldFmt) {
      makePipelineAndBindGroup();
    }
  }
}

// 初期化
configureCanvas();
makePipelineAndBindGroup();

// ---- 描画ループ ----
let start = performance.now();
let lastFrameIndex = -1;

function tick(now) {
  resizeCanvas();

  const sec = (now - start) / 1000;
  const frameIndex = Math.floor(sec * FPS);

  // FPS固定っぽくしたいなら index が変わった時だけ生成/アップロード
  if (frameIndex !== lastFrameIndex) {
    const t = sec;
    const frame = PREGEN ? frames[frameIndex % FRAME_COUNT] : makeFrame(t);
    uploadFloat16RGBA(frame);
    lastFrameIndex = frameIndex;
  }

  // uniform更新
  const ab = new ArrayBuffer(ubufsize);
  new Uint32Array(ab)[0] = canvas.width;
  new Uint32Array(ab)[1] = canvas.height;
  device.queue.writeBuffer(ubuf, 0, ab);

  const view = ctx.getCurrentTexture().createView();
  const enc = device.createCommandEncoder();
  const pass = enc.beginRenderPass({
    colorAttachments: [{
      view,
      loadOp: "clear",
      storeOp: "store",
      clearValue: { r: 0, g: 0, b: 0, a: 1 },
    }]
  });
  pass.setPipeline(pipeline);
  pass.setBindGroup(0, bindGroup);
  pass.draw(3);
  pass.end();
  device.queue.submit([enc.finish()]);

  requestAnimationFrame(tick);
}
requestAnimationFrame(tick);

canvas.onclick = () => canvas.requestFullscreen();
</script>
</html>
